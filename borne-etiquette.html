<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lollyland — Personnalise ton étiquette</title>

<!-- Polices script proches de l'étiquette originale -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lobster&family=Yellowtail&family=Sacramento&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: linear-gradient(135deg, #ffd8e8 0%, #ffeef5 100%);
        font-family: 'Segoe UI', Tahoke, sans-serif;
        color: #4a154b;
        overflow-x: hidden;
    }

    header {
        background: #e91e63;
        color: white;
        padding: 18px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    header h1 {
        margin: 0;
        font-family: 'Pacifico', cursive;
        font-weight: 400;
        font-size: 36px;
        letter-spacing: 1px;
    }

    header p {
        margin: 6px 0 0;
        font-size: 16px;
        opacity: 0.95;
    }

    main {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 80px;
        padding: 40px 60px;
        max-width: 1400px;
        margin: 0 auto;
        min-height: calc(100vh - 110px);
    }

    /* ---------- ÉTIQUETTE ---------- */
    .sticker-wrap {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .sticker {
        position: relative;
        width: 500px;
        height: 500px;
        max-width: 90vw;
        max-height: 90vw;
    }

    .sticker img {
        width: 100%;
        height: 100%;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
    }

    /* Zone texte centrée (sous le logo, au-dessus des lollipops) */
    .sticker .text {
        position: absolute;
        top: 42%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 78%;
        text-align: center;
        color: #e6308a;             /* rose magenta proche de l'original */
        font-family: 'Pacifico', cursive;
        font-size: 64px;
        line-height: 1.05;
        word-wrap: break-word;
        pointer-events: none;
        text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    }

    /* ---------- PANNEAU DE CONTRÔLE ---------- */
    .panel {
        flex: 1 1 360px;
        max-width: 480px;
        background: white;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 8px 25px rgba(233, 30, 99, 0.15);
    }

    .panel h2 {
        margin: 0 0 18px;
        color: #e91e63;
        font-family: 'Pacifico', cursive;
        font-weight: 400;
        font-size: 28px;
    }

    label {
        display: block;
        font-weight: 600;
        margin: 18px 0 8px;
        color: #4a154b;
        font-size: 15px;
    }

    textarea, input[type="text"] {
        width: 100%;
        font-size: 22px;
        padding: 14px;
        border: 2px solid #f8bbd0;
        border-radius: 12px;
        outline: none;
        font-family: inherit;
        transition: border-color 0.2s;
        resize: vertical;
    }

    textarea {
        min-height: 90px;
    }

    textarea:focus, input:focus {
        border-color: #e91e63;
    }

    .row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
    }

    .row > * { flex: 1; min-width: 120px; }

    select, input[type="range"] {
        width: 100%;
        font-size: 18px;
        padding: 10px;
        border: 2px solid #f8bbd0;
        border-radius: 12px;
        background: white;
        font-family: inherit;
    }

    input[type="range"] {
        padding: 0;
        accent-color: #e91e63;
    }

    .size-value {
        flex: 0 0 50px;
        text-align: center;
        font-weight: 600;
        color: #e91e63;
    }

    .presets {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
    }

    .presets button {
        flex: 1 1 auto;
        background: #fce4ec;
        color: #e91e63;
        border: 2px solid transparent;
        padding: 10px 14px;
        border-radius: 20px;
        font-size: 15px;
        cursor: pointer;
        font-family: 'Pacifico', cursive;
        transition: all 0.2s;
    }

    .presets button:hover {
        background: #f8bbd0;
        border-color: #e91e63;
    }

    /* ---------- EMOJIS ---------- */
    .emoji-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
        gap: 6px;
        margin-top: 8px;
        max-height: 160px;
        overflow-y: auto;
        padding: 8px;
        background: #fff5f9;
        border: 2px solid #f8bbd0;
        border-radius: 12px;
    }

    .emoji-grid button {
        background: white;
        border: 1px solid transparent;
        border-radius: 8px;
        padding: 4px 0;
        font-size: 24px;
        line-height: 1;
        cursor: pointer;
        transition: all 0.15s;
    }

    .emoji-grid button:hover {
        background: #fce4ec;
        border-color: #e91e63;
        transform: scale(1.15);
    }

    .actions {
        display: flex;
        gap: 12px;
        margin-top: 28px;
        flex-wrap: wrap;
    }

    .actions button {
        flex: 1 1 140px;
        font-size: 18px;
        padding: 16px 20px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 700;
        transition: transform 0.1s, box-shadow 0.2s;
    }

    .btn-primary {
        background: #e91e63;
        color: white;
        box-shadow: 0 4px 12px rgba(233, 30, 99, 0.4);
    }

    .btn-primary:hover { background: #d81b60; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
        background: white;
        color: #e91e63;
        border: 2px solid #e91e63 !important;
    }

    .btn-secondary:hover { background: #fce4ec; }

    /* ---------- IMPRESSION ---------- */
    @media print {
        @page { size: auto; margin: 0; }
        body { background: white; }
        header, .panel, .sticker-wrap > .hint { display: none !important; }
        main { padding: 0; gap: 0; display: block; }
        .sticker-wrap { display: block; }
        .sticker {
            width: 10cm;
            height: 10cm;
            margin: 0 auto;
        }
    }

    .hint {
        margin-top: 12px;
        font-size: 14px;
        color: #888;
        text-align: center;
        max-width: 500px;
    }

    /* ---------- SÉLECTEUR DE LANGUE ---------- */
    .lang-switch {
        position: absolute;
        top: 18px;
        right: 20px;
        display: flex;
        gap: 6px;
    }

    .lang-switch button {
        background: rgba(255,255,255,0.2);
        color: white;
        border: 2px solid rgba(255,255,255,0.5);
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
    }

    .lang-switch button:hover {
        background: rgba(255,255,255,0.35);
    }

    .lang-switch button.active {
        background: white;
        color: #e91e63;
        border-color: white;
    }

    header { position: relative; }
</style>
</head>
<body>

<header>
    <h1 id="headerTitle">Lollyland — Personnalise ton étiquette</h1>
    <p id="headerSubtitle">Tape ton message, choisis ta police, et imprime !</p>
    <div class="lang-switch" id="langSwitch">
        <button data-lang="fr" class="active">FR</button>
        <button data-lang="nl">NL</button>
    </div>
</header>

<main>
    <div class="sticker-wrap">
        <div class="sticker" id="sticker">
            <img src="modèle.png" alt="Étiquette Lollyland">
            <div class="text" id="previewText">Shh,<br>niet delen!</div>
        </div>
        <p class="hint" id="hintText">Aperçu en temps réel</p>
    </div>

    <section class="panel">
        <h2 id="panelTitle">Ton message</h2>

        <label for="messageInput" id="labelMessage">Texte personnalisé</label>
        <textarea id="messageInput" maxlength="120" placeholder="Écris ton message ici…">Shh,
niet delen!</textarea>

        <label id="labelPresets">Suggestions rapides</label>
        <div class="presets" id="presets"></div>

        <label id="labelEmojis">Smileys & symboles</label>
        <div class="emoji-grid" id="emojiGrid"></div>

        <label for="fontSelect" id="labelFont">Police</label>
        <select id="fontSelect">
            <option value="Pacifico" selected>Pacifico</option>
            <option value="Lobster">Lobster</option>
            <option value="Yellowtail">Yellowtail</option>
            <option value="Sacramento">Sacramento</option>
            <option value="Great Vibes">Great Vibes</option>
        </select>

        <label for="sizeRange" id="labelSize">Taille du texte</label>
        <div class="row">
            <input type="range" id="sizeRange" min="28" max="100" value="64">
            <span class="size-value" id="sizeValue">64</span>
        </div>

        <div class="actions">
            <button class="btn-secondary" id="resetBtn">Réinitialiser</button>
            <button class="btn-primary" id="printBtn">Imprimer 🖨</button>
        </div>
    </section>
</main>

<script>
    const input    = document.getElementById('messageInput');
    const preview  = document.getElementById('previewText');
    const fontSel  = document.getElementById('fontSelect');
    const sizeRng  = document.getElementById('sizeRange');
    const sizeVal  = document.getElementById('sizeValue');
    const presets  = document.getElementById('presets');
    const emojiGrid = document.getElementById('emojiGrid');
    const resetBtn = document.getElementById('resetBtn');
    const printBtn = document.getElementById('printBtn');

    /* ---------- EMOJIS DISPONIBLES ---------- */
    const EMOJIS = [
        '❤️','💕','💖','💗','💝','💞','💟','💛','💚','💙','💜','🤍','🖤',
        '😀','😃','😄','😁','😆','😊','😍','🤩','😘','😗','😙','😚','😋','😝','🤗',
        '🍭','🍬','🍫','🍪','🍰','🎂','🧁','🍩','🍨','🍦','🍧',
        '🎈','🎉','🎊','🎁','🎀','✨','🌟','⭐','💫','🌈','🔥','💯',
        '🌸','🌷','🌺','🌻','🌹','🥀','🍂','🍀','🍁',
        '🐶','🐱','🐭','🐰','🦊','🐻','🐼','🐨','🐯','🦄','🐝','🐞'
    ];

    function buildEmojiGrid() {
        emojiGrid.innerHTML = '';
        EMOJIS.forEach(em => {
            const b = document.createElement('button');
            b.type = 'button';
            b.textContent = em;
            b.addEventListener('click', () => insertAtCursor(em));
            emojiGrid.appendChild(b);
        });
    }

    function insertAtCursor(text) {
        const start = input.selectionStart ?? input.value.length;
        const end   = input.selectionEnd   ?? input.value.length;
        input.value = input.value.slice(0, start) + text + input.value.slice(end);
        const pos = start + text.length;
        input.focus();
        input.setSelectionRange(pos, pos);
        updatePreview();
    }

    /* ---------- TRADUCTIONS ---------- */
    const I18N = {
        fr: {
            htmlLang: 'fr',
            headerTitle: 'Lollyland — Personnalise ton étiquette',
            headerSubtitle: 'Tape ton message, choisis ta police, et imprime !',
            hint: 'Aperçu en temps réel',
            panelTitle: 'Ton message',
            labelMessage: 'Texte personnalisé',
            labelPresets: 'Suggestions rapides',
            labelEmojis: 'Smileys & symboles',
            labelFont: 'Police',
            labelSize: 'Taille du texte',
            placeholder: 'Écris ton message ici…',
            reset: 'Réinitialiser',
            print: 'Imprimer 🖨',
            fontRecommended: 'Pacifico (recommandé)',
            presets: [
                { label: 'Shh, ne pas partager !', text: 'Shh,\nniet delen!' },
                { label: 'Pour toi avec amour',    text: 'Pour toi\navec amour' },
                { label: 'Félicitations !',        text: 'Félicitations !' },
                { label: 'Merci !',                text: 'Merci !' },
                { label: 'Je t\'aime !',            text: 'Je t\'aime !' }
            ]
        },
        nl: {
            htmlLang: 'nl',
            headerTitle: 'Lollyland — Personaliseer je etiket',
            headerSubtitle: 'Typ je bericht, kies je lettertype en print!',
            hint: 'Live voorbeeld',
            panelTitle: 'Jouw bericht',
            labelMessage: 'Aangepaste tekst',
            labelPresets: 'Snelle suggesties',
            labelEmojis: 'Smileys & symbolen',
            labelFont: 'Lettertype',
            labelSize: 'Tekstgrootte',
            placeholder: 'Schrijf hier je bericht…',
            reset: 'Opnieuw',
            print: 'Afdrukken 🖨',
            fontRecommended: 'Pacifico (aanbevolen)',
            presets: [
                { label: 'Shh, niet delen!',     text: 'Shh,\nniet delen!' },
                { label: 'Voor jou met liefde',  text: 'Voor jou\nmet liefde' },
                { label: 'Proficiat!',           text: 'Proficiat!' },
                { label: 'Bedankt!',             text: 'Bedankt!' },
                { label: 'Ik hou van jou!',      text: 'Ik hou\nvan jou!' }
            ]
        }
    };

    let currentLang = 'fr';

    const DEFAULTS = {
        text: 'Shh,\nniet delen!',
        font: 'Pacifico',
        size: 64
    };

    function escapeHtml(s) {
        return s.replace(/[&<>"']/g, c => ({
            '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        }[c]));
    }

    function updatePreview() {
        const txt = input.value || ' ';
        preview.innerHTML = escapeHtml(txt).replace(/\n/g, '<br>');
        preview.style.fontFamily = `'${fontSel.value}', cursive`;
        preview.style.fontSize   = sizeRng.value + 'px';
        sizeVal.textContent      = sizeRng.value;
    }

    input.addEventListener('input', updatePreview);
    fontSel.addEventListener('change', updatePreview);
    sizeRng.addEventListener('input', updatePreview);

    presets.addEventListener('click', e => {
        const btn = e.target.closest('button[data-text]');
        if (!btn) return;
        input.value = btn.dataset.text;
        updatePreview();
    });

    resetBtn.addEventListener('click', () => {
        input.value     = DEFAULTS.text;
        fontSel.value   = DEFAULTS.font;
        sizeRng.value   = DEFAULTS.size;
        updatePreview();
    });

    printBtn.addEventListener('click', () => window.print());

    /* ---------- GESTION LANGUE ---------- */
    function applyLang(lang) {
        const t = I18N[lang];
        if (!t) return;
        currentLang = lang;
        document.documentElement.lang             = t.htmlLang;
        document.getElementById('headerTitle').textContent    = t.headerTitle;
        document.getElementById('headerSubtitle').textContent = t.headerSubtitle;
        document.getElementById('hintText').textContent       = t.hint;
        document.getElementById('panelTitle').textContent     = t.panelTitle;
        document.getElementById('labelMessage').textContent   = t.labelMessage;
        document.getElementById('labelPresets').textContent   = t.labelPresets;
        document.getElementById('labelEmojis').textContent    = t.labelEmojis;
        document.getElementById('labelFont').textContent      = t.labelFont;
        document.getElementById('labelSize').textContent      = t.labelSize;
        input.setAttribute('placeholder', t.placeholder);
        resetBtn.textContent = t.reset;
        printBtn.textContent = t.print;
        fontSel.options[0].textContent = t.fontRecommended;

        // Reconstruit les suggestions
        presets.innerHTML = '';
        t.presets.forEach(p => {
            const b = document.createElement('button');
            b.dataset.text = p.text;
            b.textContent  = p.label;
            presets.appendChild(b);
        });

        // Bascule visuelle des boutons langue
        document.querySelectorAll('#langSwitch button').forEach(b => {
            b.classList.toggle('active', b.dataset.lang === lang);
        });
    }

    document.getElementById('langSwitch').addEventListener('click', e => {
        const btn = e.target.closest('button[data-lang]');
        if (!btn) return;
        applyLang(btn.dataset.lang);
    });

    // Langue par défaut : FR (modifiable ici → 'nl' pour démarrer en néerlandais)
    buildEmojiGrid();
    applyLang('fr');
    updatePreview();
</script>

</body>
</html>
